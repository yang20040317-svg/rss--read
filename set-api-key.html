<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>API Key 配置</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 { color: #2C2416; }
    .success { color: #4CAF50; }
    .error { color: #f44336; }
    button {
      padding: 12px 24px;
      background: #C09464;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }
    button:hover { background: #A87D4F; }
  </style>
</head>
<body>
  <div class="card">
    <h2>API Key 配置工具</h2>
    <p>正在为 RSS 阅读器配置 SiliconFlow API Key...</p>
    <div id="status"></div>
  </div>

  <script>
    const API_KEY = 'sk-plqsiefswevmpemlkntgwicfuawsbhciwgtqrmwaaeiqwtrd';
    
    try {
      localStorage.setItem('spark_api_key', API_KEY);
      document.getElementById('status').innerHTML = 
        '<p class="success">✓ API Key 配置成功！</p><p>请刷新 RSS 阅读器页面</p>';
    } catch (e) {
      document.getElementById('status').innerHTML = 
        '<p class="error">✗ 配置失败: ' + e.message + '</p>';
    }
  </script>
</body>
</html>
