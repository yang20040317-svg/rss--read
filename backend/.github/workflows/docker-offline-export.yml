# Build Docker image and export as tar file for offline use
# Creates a GitHub Release with the tar file attached

name: Docker Offline Export

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      platforms:
        description: 'Platforms to build (comma-separated)'
        required: true
        default: 'linux/amd64'
        type: choice
        options:
          - 'linux/amd64'
          - 'linux/arm64'
          - 'linux/amd64,linux/arm64'

env:
  IMAGE_NAME: tmwgsicp/wechat-download-api

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (amd64)
        if: contains(github.event.inputs.platforms, 'linux/amd64')
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag ${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}-amd64 \
            --load \
            .
          docker save ${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}-amd64 \
            -o wechat-download-api-${{ github.event.inputs.tag }}-amd64.tar
          gzip wechat-download-api-${{ github.event.inputs.tag }}-amd64.tar
          ls -lh *.tar.gz

      - name: Build Docker image (arm64)
        if: contains(github.event.inputs.platforms, 'linux/arm64')
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --tag ${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}-arm64 \
            --load \
            .
          docker save ${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}-arm64 \
            -o wechat-download-api-${{ github.event.inputs.tag }}-arm64.tar
          gzip wechat-download-api-${{ github.event.inputs.tag }}-arm64.tar
          ls -lh *.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          body: |
            ## Docker Offline Package
            
            This release includes pre-built Docker images for offline deployment.
            
            ### Download
            - `wechat-download-api-${{ github.event.inputs.tag }}-amd64.tar.gz` - For x86_64 servers
            - `wechat-download-api-${{ github.event.inputs.tag }}-arm64.tar.gz` - For ARM64 servers (Apple M1/M2, AWS Graviton, etc.)
            
            ### Usage
            
            ```bash
            # 1. Download and decompress
            gunzip wechat-download-api-${{ github.event.inputs.tag }}-amd64.tar.gz
            
            # 2. Load image
            docker load -i wechat-download-api-${{ github.event.inputs.tag }}-amd64.tar
            
            # 3. Verify
            docker images | grep wechat-download-api
            
            # 4. Run (modify docker-compose.yml to use local image)
            docker-compose up -d
            ```
            
            ### Notes
            - No internet connection required after loading the image
            - Make sure to match your server architecture (amd64 or arm64)
          files: |
            wechat-download-api-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
